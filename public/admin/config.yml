backend:
  name: git-gateway
  branch: main

media_folder: "public/assets"
public_folder: "/assets"

publish_mode: simple

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "Site Settings"
        file: "src/content/settings/site.json"
        fields:
          - { label: "Brand accent", name: "accent", widget: "select", options: [
              { label: "Forest green", value: "#2E6417" },
              { label: "Ocean blue", value: "#0025CC" },
              { label: "Lime", value: "#7FBF4D" },
            ] }
          - { label: "Atmosphere glow intensity", name: "glow", widget: "number", value_type: "float", min: 0, max: 1, step: 0.05 }
          - { label: "Show floating coordinates in hero", name: "showCoords", widget: "boolean" }
          - { label: "Service card hover style", name: "cardHoverStyle", widget: "select", options: ["Glow", "Border trace", "Stroke draw", "Spotlight"] }
          - { label: "Map style (Projects & Contact)", name: "mapStyle", widget: "select", options: ["Streets", "Minimal", "Terrain"] }
          - { label: "Project card cover", name: "cardCover", widget: "select", options: ["Gradient", "Contour", "Mono"] }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "WhatsApp link", name: "whatsapp", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Hero eyebrow", name: "heroEyebrow", widget: "string" }
          - { label: "Hero headline (plain part)", name: "heroHeadlinePlain", widget: "string" }
          - { label: "Hero headline (gradient part)", name: "heroHeadlineGradient", widget: "string" }
          - { label: "Hero lead paragraph", name: "heroLead", widget: "text" }
          - name: "stats"
            label: "Hero stats"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "number" }
              - { label: "Suffix", name: "suffix", widget: "string", required: false }
              - { label: "Label", name: "label", widget: "string" }
          - { label: "RTK accuracy value", name: "rtkAccuracy", widget: "string" }
          - { label: "RTK accuracy unit", name: "rtkUnit", widget: "string" }
          - { label: "RTK accuracy label", name: "rtkLabel", widget: "string" }
          - { label: "Mission statement", name: "missionText", widget: "text" }
          - { label: "Vision statement", name: "visionText", widget: "text" }
          - name: "values"
            label: "Core values"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "string" }
          - { label: "Technology stack marquee", name: "techStack", widget: "list" }
          - name: "processSteps"
            label: "How We Work steps (Services page)"
            widget: "list"
            fields:
              - { label: "Step label", name: "step", widget: "string", hint: "e.g. 01 · BRIEF" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - name: "journey"
            label: "Journey timeline (About page)"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string", hint: "e.g. FOUNDED" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - { label: "About story, paragraph 1", name: "aboutStory1", widget: "text" }
          - { label: "About story, paragraph 2", name: "aboutStory2", widget: "text" }
          - { label: "CTA badge text", name: "ctaBadge", widget: "string" }
          - { label: "CTA headline (plain part)", name: "ctaHeadlinePlain", widget: "string" }
          - { label: "CTA headline (gradient part)", name: "ctaHeadlineGradient", widget: "string" }
          - { label: "CTA subcopy", name: "ctaSubcopy", widget: "text" }
          - { label: "Footer blurb", name: "footerBlurb", widget: "text" }

  - name: "services"
    label: "Services"
    folder: "src/content/services"
    identifier_field: "title"
    extension: "json"
    format: "json"
    create: true
    fields:
      - { label: "Number", name: "number", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description (Home card)", name: "description", widget: "text" }
      - { label: "Tagline (Services page card)", name: "tagline", widget: "string" }
      - { label: "Capability bullets (Services page)", name: "items", widget: "list" }
      - { label: "Icon", name: "icon", widget: "select", options: ["land-survey", "construction", "urban-planning", "interior-design", "landscaping", "real-estate"] }
      - { label: "Order", name: "order", widget: "number" }

  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    identifier_field: "title"
    extension: "json"
    format: "json"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Survey", "Construction", "GIS", "Planning", "Interior", "Landscape"] }
      - { label: "Location line", name: "location", widget: "string", hint: "e.g. KIAMBU · -1.171, 36.836" }
      - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
      - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Order", name: "order", widget: "number" }

  - name: "faqs"
    label: "FAQs"
    folder: "src/content/faqs"
    identifier_field: "question"
    extension: "json"
    format: "json"
    create: true
    fields:
      - { label: "Question", name: "question", widget: "string" }
      - { label: "Answer", name: "answer", widget: "text" }
      - { label: "Order", name: "order", widget: "number" }

  - name: "team"
    label: "Team"
    folder: "src/content/team"
    identifier_field: "name"
    extension: "json"
    format: "json"
    create: true
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Bio", name: "bio", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Order", name: "order", widget: "number" }

  - name: "testimonials"
    label: "Testimonials"
    folder: "src/content/testimonials"
    identifier_field: "name"
    extension: "json"
    format: "json"
    create: true
    fields:
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Order", name: "order", widget: "number" }
