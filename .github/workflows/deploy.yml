name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Project sites live at https://<owner>.github.io/<repo>/ and need a
      # base path; a user site repo (<owner>.github.io) is served from root.
      - name: Compute site URL and base path
        run: |
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "SITE_URL=https://${{ github.event.repository.name }}" >> "$GITHUB_ENV"
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"
            echo "BASE_PATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

      - name: Build and upload
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
